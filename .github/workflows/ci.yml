name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: helix-signal

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Import smoke check
        run: .venv/bin/python -c "import main"

      - name: Pytest with coverage
        run: .venv/bin/pytest -v --cov=.. --cov-report=term --cov-fail-under=60 -m "not network" --timeout=120

      - name: Ruff lint
        run: .venv/bin/ruff check --output-format=github .

      - name: Bandit security scan
        run: .venv/bin/bandit -r . -x ".venv,tests,__pycache__" --skip B101 -ll --exit-zero

      - name: pip-audit
        run: .venv/bin/pip-audit --requirement requirements.txt || true

      - name: hadolint Dockerfiles
        run: |
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0 < ../frontend/Dockerfile
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0 < ../backend/Dockerfile

  smoke:
    if: github.event_name != 'pull_request'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose --profile data up -d --build
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Services ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          POSTGRES_PASSWORD: "helix"
          POSTGRES_USER: "helix"
          POSTGRES_DB: "helix"
          CLICKHOUSE_PASSWORD: ""

      - name: Run smoke check
        run: |
          chmod +x scripts/smoke-check.sh
          ./scripts/smoke-check.sh "${BASE_URL}"
        env:
          BASE_URL: "http://localhost"

      - name: Clean up
        run: docker compose down -v

  docker:
    if: github.event_name != 'pull_request'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ steps.meta.outputs.version || 'latest' }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  deploy:
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /apps/helix-signal
            git pull origin main
            docker compose pull
            docker compose up -d --build
            echo "Deploy complete, verifying..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                break
              fi
              sleep 2
            done
