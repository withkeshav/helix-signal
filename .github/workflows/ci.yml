name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: helix-signal

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: helix
          POSTGRES_PASSWORD: helix
          POSTGRES_DB: helix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helix -d helix_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Import smoke check
        run: .venv/bin/python -c "import main"

      - name: Alembic migration smoke test
        run: .venv/bin/python -m pytest tests/test_alembic.py -v -m "not slow"

      - name: Generate V4 ONNX models (safety net)
        run: .venv/bin/python ../scripts/build_v4_models.py

      - name: Validate assets config
        run: python3 ../scripts/validate_assets.py

      - name: Postgres integration tests
        env:
          DATABASE_URL: postgresql://helix:helix@localhost:5432/helix_test
          SESSION_SIGNING_KEY: test-session-signing-key-for-pytest-only
          HELIX_SKIP_STARTUP_REFRESH: "1"
        run: |
          .venv/bin/alembic upgrade head
          .venv/bin/pytest tests/test_postgres_integration.py -v --timeout=120

      - name: Pytest with coverage
        run: .venv/bin/pytest -v --cov=.. --cov-report=term --cov-fail-under=60 -m "not network" --timeout=120

      - name: Ruff lint
        run: .venv/bin/ruff check --output-format=github .

      - name: Bandit security scan
        run: .venv/bin/bandit -r routes services signal_engine core providers database models scripts -x tests,__pycache__ --skip B101 -ll

      - name: pip-audit
        run: .venv/bin/pip-audit --requirement requirements.txt

      - name: gitleaks detect
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: hadolint Dockerfiles
        run: |
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0 < ../frontend/Dockerfile
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0 < ../backend/Dockerfile

  smoke:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          printf "POSTGRES_PASSWORD=smoketest-ci\nAI_MODE=ai_off\nHELIX_SKIP_STARTUP_REFRESH=1\n" > .env
          docker compose up -d --build
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Services ready after ${i}s"
              break
            fi
            sleep 2
          done
          if ! curl -sf http://localhost/ > /dev/null 2>&1; then
            echo "FAILED: frontend never became healthy"
            docker compose logs --tail=50 frontend
            exit 1
          fi

      - name: Run smoke check
        run: |
          chmod +x scripts/smoke-check.sh
          ./scripts/smoke-check.sh "${BASE_URL}"
        env:
          BASE_URL: "http://localhost"

      - name: Set up Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Check frontend renders
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto('http://localhost', { waitUntil: 'networkidle' });
            const title = await page.title();
            console.log('Page title:', title);
            const content = await page.content();
            if (content.includes('Helix') || content.includes('Signal')) {
              console.log('SUCCESS: Frontend renders with expected content');
            } else {
              console.error('FAIL: Frontend missing expected content');
              process.exit(1);
            }
            await browser.close();
          })();
          "

      - name: Clean up
        run: docker compose down -v

  docker:
    if: github.event_name != 'pull_request'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ steps.meta.outputs.version || 'latest' }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: backend/.trivyignore

  deploy:
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /apps/helix-signal
            git pull origin main
            docker compose pull
            docker compose up -d --no-build
            echo "Deploy complete, verifying..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                break
              fi
              sleep 2
            done
            if ! curl -sf http://localhost/api/health >/dev/null 2>&1; then
              echo "DEPLOY FAILED: backend not healthy after timeout"; exit 1; fi
