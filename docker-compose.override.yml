services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      HELIX_SKIP_STARTUP_REFRESH: "1"
      LOG_LEVEL: DEBUG
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"

  traefik:
    ports:
      - "8080:8080"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
