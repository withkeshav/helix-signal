services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      ALLOW_BACKFILL: "true"
      LOG_LEVEL: DEBUG
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"

