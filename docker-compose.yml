services:
  traefik:
    image: traefik:v3.7
    container_name: helix-traefik
    restart: unless-stopped
    networks:
      - web_gateway
      - internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./acme.json:/acme.json
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cloudflare_token
    secrets:
      - cloudflare_token
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${HELIX_DOMAIN:-helix.local}`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=auth@file"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.routers.http-catchall.priority=1"

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: helix-postgres
    restart: unless-stopped
    profiles: ["data"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix}
      POSTGRES_DB: ${POSTGRES_DB:-helix}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    restart: unless-stopped
    profiles: ["data"]
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    volumes:
      - redis_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    container_name: helix-mlflow
    restart: unless-stopped
    profiles: ["data"]
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - internal
    expose:
      - "5000"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/helix.db}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-300}
      TREND_RETENTION_DAYS: ${TREND_RETENTION_DAYS:-90}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-30}
      ALLOW_BACKFILL: ${ALLOW_BACKFILL:-false}
      DEFILLAMA_API_KEY: ${DEFILLAMA_API_KEY:-}
      AI_MODE: ${AI_MODE:-ai_off}
    networks:
      - internal
    volumes:
      - ./config:/config:ro
      - helix_data:/data
    expose:
      - "8000"

  celery-beat:
    build:
      context: ./backend
    profiles: ["data"]
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://helix:helix@postgres:5432/helix}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-300}
    networks:
      - internal
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./backend
    profiles: ["data"]
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://helix:helix@postgres:5432/helix}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      AI_MODE: ${AI_MODE:-ai_lite}
    networks:
      - internal
    volumes:
      - ./config:/config:ro
      - helix_data:/data
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${HELIX_DOMAIN:-helix.local}`)"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    expose:
      - "80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: helix-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=https://${HELIX_DOMAIN:-helix.local}/prometheus'
      - '--web.route-prefix=/'
    networks:
      - internal
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`${HELIX_DOMAIN:-helix.local}`) && PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.middlewares=prometheus-stripprefix,auth@file"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.prometheus-stripprefix.stripprefix.prefixes=/prometheus"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.5
    container_name: helix-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
    networks:
      - internal
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${HELIX_DOMAIN:-helix.local}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.middlewares=grafana-stripprefix,auth@file"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.grafana-stripprefix.stripprefix.prefixes=/grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    expose:
      - "3000"
    secrets:
      - grafana_admin_password

networks:
  web_gateway:
    external: true
  internal:
    driver: bridge

volumes:
  helix_data:
  postgres_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  cloudflare_token:
    file: ./secrets/cloudflare_token.txt
