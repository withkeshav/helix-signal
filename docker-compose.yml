services:
  postgres:
    image: timescale/timescaledb:2.26.4-pg16
    container_name: helix-postgres
    restart: unless-stopped
    profiles: ["data"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-helix}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.9-alpine
    container_name: helix-redis
    restart: unless-stopped
    profiles: ["data"]
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    profiles: ["data"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/helix.db}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-300}
      TREND_RETENTION_DAYS: ${TREND_RETENTION_DAYS:-90}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-30}
      ALLOW_BACKFILL: ${ALLOW_BACKFILL:-false}
      DEFILLAMA_API_KEY: ${DEFILLAMA_API_KEY:-}
      AI_MODE: ${AI_MODE:-ai_off}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    networks:
      - internal
    volumes:
      - ./config:/app/config:ro
      - helix_data:/data
    user: "1001:1001"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    profiles: ["data"]
    ports:
      - "8080:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  helix_data:
  postgres_data:
  redis_data:


