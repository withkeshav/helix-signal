services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: helix-postgres
    restart: unless-stopped
    profiles: ["data"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix}
      POSTGRES_DB: ${POSTGRES_DB:-helix}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: helix-clickhouse
    restart: unless-stopped
    profiles: ["data"]
    environment:
      CLICKHOUSE_DB: helix
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    ports:
      - "8123:8123"
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    restart: unless-stopped
    profiles: ["data"]
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    container_name: helix-mlflow
    restart: unless-stopped
    profiles: ["data"]
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - internal
    expose:
      - "5000"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/helix.db}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-300}
      TREND_RETENTION_DAYS: ${TREND_RETENTION_DAYS:-90}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-30}
      ALLOW_BACKFILL: ${ALLOW_BACKFILL:-false}
      DEFILLAMA_API_KEY: ${DEFILLAMA_API_KEY:-}
      AI_MODE: ${AI_MODE:-ai_off}
      HELIX_USE_CELERY_REFRESH: ${HELIX_USE_CELERY_REFRESH:-false}
    networks:
      - internal
    volumes:
      - ./config:/app/config:ro
      - helix_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  celery-beat:
    build:
      context: ./backend
    profiles: ["data"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=16M
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://helix:helix@postgres:5432/helix}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-300}
    networks:
      - internal
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./backend
    profiles: ["data"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32M
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://helix:helix@postgres:5432/helix}
      HELIX_USE_ALEMBIC: ${HELIX_USE_ALEMBIC:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      AI_MODE: ${AI_MODE:-ai_off}
    networks:
      - internal
    volumes:
      - ./config:/app/config:ro
      - helix_data:/data
    depends_on:
      - redis
      - postgres

  timesfm:
    build:
      context: ./backend/ml_models/timesfm
    container_name: helix-timesfm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=256M
    profiles: ["data"]
    environment:
      MODEL_NAME: google/timesfm-2.5-200m-pytorch
      MAX_CONTEXT: ${TIMESFM_MAX_CONTEXT:-1024}
      MAX_HORIZON: ${TIMESFM_MAX_HORIZON:-256}
    networks:
      - internal
    expose:
      - "8100"
    mem_limit: 3g
    deploy:
      resources:
        reservations:
          memory: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  helix_data:
  postgres_data:
  clickhouse_data:
  redis_data:
  mlflow_data:

