<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helix Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f7fb;
        --bg-accent: #e9eef9;
        --panel: #ffffff;
        --line: #d5deed;
        --text: #0f172a;
        --muted: #52607a;
        --up: #0f8f68;
        --down: #b6283a;
        --neutral: #9a6a00;
        --ok-bg: rgba(15, 143, 104, 0.12);
        --warn-bg: rgba(154, 106, 0, 0.12);
        --alert-bg: rgba(182, 40, 58, 0.12);
        --btn-bg: #111827;
        --btn-text: #f9fafb;
        --btn-muted-bg: #edf2ff;
        --btn-muted-text: #1e293b;
        --spark: #3b82f6;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0c1018;
        --bg-accent: #172138;
        --panel: #121826;
        --line: #273247;
        --text: #e8edf7;
        --muted: #9aa8c4;
        --up: #2dd4bf;
        --down: #f87171;
        --neutral: #fbbf24;
        --ok-bg: rgba(45, 212, 191, 0.12);
        --warn-bg: rgba(251, 191, 36, 0.12);
        --alert-bg: rgba(248, 113, 113, 0.12);
        --btn-bg: #e8edf7;
        --btn-text: #0f172a;
        --btn-muted-bg: #1b2436;
        --btn-muted-text: #e8edf7;
        --spark: #60a5fa;
      }
      * { box-sizing: border-box; }
      @font-face {
        font-family: "HelixMonoFallback";
        src: local("JetBrains Mono"), local("Roboto Mono"), local("Consolas");
      }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: radial-gradient(circle at top, var(--bg-accent), var(--bg));
        color: var(--text);
      }
      .container {
        width: min(1200px, 96vw);
        margin: 24px auto;
      }
      .header {
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        flex-wrap: wrap;
      }
      .header-meta { display: flex; flex-direction: column; gap: 6px; }
      .title { margin: 0; font-size: clamp(22px, 2.6vw, 32px); }
      .subtitle { margin: 6px 0 0; color: var(--muted); }
      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        border: 1px solid transparent;
        border-radius: 9px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--btn-bg);
        color: var(--btn-text);
      }
      .btn-muted {
        background: var(--btn-muted-bg);
        color: var(--btn-muted-text);
        border-color: var(--line);
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .state {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
      }
      .error { color: #fecaca; }
      .warning-banner {
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--warn-bg);
        color: var(--text);
        display: none;
      }
      .warning-banner.visible { display: block; }
      .table-wrap { overflow-x: auto; }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
      }
      th, td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        white-space: nowrap;
      }
      .num {
        text-align: right;
        font-family: "JetBrains Mono", "Roboto Mono", "HelixMonoFallback", monospace;
        font-variant-numeric: tabular-nums;
      }
      th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--panel);
      }
      tr:hover td { background: color-mix(in srgb, var(--panel) 92%, var(--line)); }
      tbody.stale td {
        opacity: 0.72;
      }
      .delta-up { color: var(--up); font-weight: 600; }
      .delta-down { color: var(--down); font-weight: 600; }
      .delta-flat { color: var(--neutral); font-weight: 600; }
      .peg-ok { color: var(--up); font-weight: 600; }
      .peg-watch { color: var(--neutral); font-weight: 600; }
      .peg-alert { color: var(--down); font-weight: 600; }
      .sparkline { width: 110px; height: 32px; }
      .signal-badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 7px;
        font-size: 11px;
        border-radius: 999px;
        border: 1px solid transparent;
        vertical-align: middle;
      }
      .badge-growth {
        color: #6ee7b7;
        border-color: rgba(110, 231, 183, 0.45);
        background: rgba(16, 185, 129, 0.12);
      }
      .badge-contraction {
        color: #fca5a5;
        border-color: rgba(252, 165, 165, 0.45);
        background: rgba(239, 68, 68, 0.12);
      }
      .footer {
        padding: 14px 16px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        color: var(--muted);
      }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 10px;
      }
      .freshness-fresh {
        color: var(--up);
        background: var(--ok-bg);
      }
      .freshness-aging {
        color: var(--neutral);
        background: var(--warn-bg);
      }
      .freshness-stale {
        color: var(--down);
        background: var(--alert-bg);
      }
      @media (max-width: 700px) {
        .container { width: 100vw; margin: 12px 0; }
        .header, .state, .footer { padding-left: 12px; padding-right: 12px; }
        .header { padding-left: 12px; padding-right: 12px; }
        .controls { width: 100%; justify-content: flex-start; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { min-width: 820px; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-meta">
          <h1 id="dashboard-title" class="title">Helix Stablecoin Signal Terminal</h1>
          <p id="dashboard-subtitle" class="subtitle">Transparent chain-level stablecoin telemetry.</p>
          <div class="status-row">
            <span id="freshness-pill" class="pill freshness-fresh">Freshness: Pending</span>
            <span id="updated-pill" class="pill">Last Updated: --</span>
          </div>
        </div>
        <div class="controls">
          <button id="refresh-btn" class="btn btn-primary" type="button">Refresh</button>
          <button id="theme-btn" class="btn btn-muted" type="button">Theme: Auto</button>
        </div>
      </header>

      <section class="panel">
        <div id="app-state" class="state">Loading dashboard data...</div>
        <div id="stale-warning" class="warning-banner"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Chain</th>
                <th id="supply-col-header" class="num">Supply</th>
                <th class="num">24h Change (%)</th>
                <th class="num">TVL</th>
                <th>Peg Status</th>
                <th class="num">Trend</th>
              </tr>
            </thead>
            <tbody id="chain-rows"></tbody>
          </table>
        </div>
        <footer id="source-footer" class="footer">
          <span class="pill">Source Health: Pending</span>
        </footer>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
