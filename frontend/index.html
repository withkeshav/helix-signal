<!doctype html>
<html lang="en" x-data="helixApp" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="`Helix Signal · ${asset}`">Helix Signal Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <!-- Tabler layout primitives (nav/cards/tables); Helix tokens in styles.css override theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js" integrity="sha384-o5uz97et3bErHvpKfD4Jz4n0JfhJDWABFuF4NP+iEEDxE1VwMWJ19QGR0lqFZnr6" crossorigin="anonymous" defer></script>
  <!-- WARNING: Changing importmap content requires updating SHA-256 hash in CSP (middleware/security.py + nginx.conf) -->
  <script type="importmap">
  {
    "imports": {
      "alpinejs": "https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/module.esm.js",
      "stores/": "/js/stores/",
      "composables/": "/js/composables/"
    }
  }
  </script>
  <script type="module" src="/js/init.js"></script>
  <!-- Playwright / test helpers: disable Alpine transitions for deterministic visibility checks -->
  <style id="test-disable-transitions">
    @media (prefers-reduced-motion: reduce) {
      .tab-content, .tab-content *, [x-transition] { transition: none !important; animation: none !important; }
    }
  </style>
  </head>
<body class="helix-app" data-bs-theme="dark">
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

    <!-- Navigation / UI -->
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>

    <symbol id="icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
    </symbol>

    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </symbol>

    <!-- Direction indicators -->
    <symbol id="icon-arrow-up" viewBox="0 0 24 24">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </symbol>

    <symbol id="icon-arrow-down" viewBox="0 0 24 24">
      <path d="M12 5v14M19 12l-7 7-7-7"/>
    </symbol>

    <symbol id="icon-chevron-up" viewBox="0 0 24 24">
      <path d="M18 15l-6-6-6 6"/>
    </symbol>

    <symbol id="icon-chevron-down" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6"/>
    </symbol>

    <!-- Section heading icons -->
    <symbol id="icon-bar-chart" viewBox="0 0 24 24">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </symbol>

    <symbol id="icon-trophy" viewBox="0 0 24 24">
      <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
      <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
      <path d="M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
      <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
      <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
    </symbol>

    <symbol id="icon-satellite" viewBox="0 0 24 24">
      <path d="M13 7 9 3 3 9l4 4"/>
      <path d="m13 7 3 3"/>
      <path d="M14 14l4 4-6 6-4-4"/>
      <path d="m14 14-3-3"/>
      <circle cx="18.5" cy="5.5" r="2.5"/>
      <path d="M22 2 20 4"/>
    </symbol>

    <symbol id="icon-clipboard" viewBox="0 0 24 24">
      <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
    </symbol>

    <symbol id="icon-lock" viewBox="0 0 24 24">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </symbol>

    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </symbol>

    <symbol id="icon-key" viewBox="0 0 24 24">
      <circle cx="7.5" cy="15.5" r="5.5"/>
      <path d="m21 2-9.6 9.6"/>
      <path d="m15.5 7.5 3 3L22 7l-3-3"/>
    </symbol>

    <symbol id="icon-globe" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
      <path d="M2 12h20"/>
    </symbol>

    <symbol id="icon-sliders" viewBox="0 0 24 24">
      <line x1="4" y1="21" x2="4" y2="14"/>
      <line x1="4" y1="10" x2="4" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="12"/>
      <line x1="12" y1="8" x2="12" y2="3"/>
      <line x1="20" y1="21" x2="20" y2="16"/>
      <line x1="20" y1="10" x2="20" y2="3"/>
      <line x1="1" y1="14" x2="7" y2="14"/>
      <line x1="9" y1="8" x2="15" y2="8"/>
      <line x1="17" y1="16" x2="23" y2="16"/>
    </symbol>

    <symbol id="icon-bot" viewBox="0 0 24 24">
      <path d="M12 8V4H8"/>
      <rect width="16" height="12" x="4" y="8" rx="2"/>
      <path d="M2 14h2M20 14h2M9 18v2M15 18v2"/>
    </symbol>

    <symbol id="icon-menu" viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
    </symbol>

    <symbol id="icon-refresh-cw" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M8 16H3v5"/>
    </symbol>

    <symbol id="icon-repeat" viewBox="0 0 24 24">
      <path d="m17 2 4 4-4 4"/>
      <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
      <path d="m7 22-4-4 4-4"/>
      <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
    </symbol>

    <symbol id="icon-users" viewBox="0 0 24 24">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </symbol>

    <symbol id="icon-download" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </symbol>

    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </symbol>

    <symbol id="icon-warning" viewBox="0 0 24 24">
      <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </symbol>

  </svg>
  <main class="container">
    <!-- Top Nav -->
    <nav class="top-nav">
      <span class="nav-brand"><svg class="icon"><use href="#icon-refresh-cw"/></svg> Helix Signal</span>
      <div class="nav-search">
        <input type="text" class="search-input" placeholder="Search assets..." x-model="searchQuery" @input.debounce.300ms="search" x-cloak x-show="false">
        <div class="search-results" x-cloak x-show="searchResults.length > 0" @click.outside="searchResults=[]">
          <template x-for="r in searchResults" :key="r.id">
            <div class="search-item" @click="selectSearchResult(r)">
              <span x-text="r.label"></span>
              <span class="search-type" x-text="r.type"></span>
            </div>
          </template>
        </div>
      </div>
      <div class="nav-links" role="tablist">
        <button class="nav-link" role="tab" :class="tab==='signal'&&'active'" :aria-selected="tab==='signal'" @click="tab='signal';loadTab()" aria-controls="tab-signal">Signal</button>
        <button class="nav-link" role="tab" :class="tab==='market'&&'active'" :aria-selected="tab==='market'" @click="tab='market';loadTab()" aria-controls="tab-market">Market</button>
        <button class="nav-link" role="tab" :class="tab==='intel'&&'active'" :aria-selected="tab==='intel'" @click="tab='intel';loadTab()" aria-controls="tab-intel">Intel</button>
        <button class="nav-link" role="tab" :class="tab==='forensics'&&'active'" :aria-selected="tab==='forensics'" @click="tab='forensics';loadTab()" aria-controls="tab-forensics" x-show="$store.ui.publicAllowsForensics()">Forensics</button>
        <button class="nav-link" role="tab" :class="tab==='alerts'&&'active'" :aria-selected="tab==='alerts'" @click="tab='alerts';loadTab()" aria-controls="tab-alerts">Alerts</button>
        <button class="nav-link" role="tab" :class="tab==='system'&&'active'" :aria-selected="tab==='system'" @click="tab='system';loadTab()" aria-controls="tab-system">System</button>
        <button class="nav-link" role="tab" :class="tab==='settings'&&'active'" :aria-selected="tab==='settings'" @click="tab='settings';loadTab()" aria-controls="tab-settings" aria-label="Settings"><svg class="icon"><use href="#icon-settings"/></svg></button>
      </div>
      <div class="nav-controls">
        <button type="button" class="btn btn-muted" title="Command palette (Ctrl+K)" @click="openPalette()">⌘K</button>
        <select class="asset-select" x-model="asset" @change="switchAsset">
          <template x-for="a in ($store.ui.enabledAssets.length ? $store.ui.enabledAssets : enabledAssets)" :key="a">
            <option x-text="a" :value="a"></option>
          </template>
        </select>
        <span class="badge badge-info" style="font-size:11px;margin-right:6px" x-text="$store.ui.isAuthenticated ? ('Operator' + ($store.ui.adminUsername ? (': ' + $store.ui.adminUsername) : '')) : 'View only'"></span>
        <span class="badge" style="font-size:11px;margin-right:6px" x-text="'AI: ' + ($store.ui.aiModeLabel || 'Off')"></span>
        <span class="badge" style="font-size:11px;margin-right:6px" x-text="'Data: ' + ($store.ui.dataHealthLabel || '—')"></span>
        <button class="btn btn-primary" @click="refresh()" :disabled="$store.ui.refreshing" title="Refresh now" aria-label="Refresh now">
          <span x-show="$store.ui.refreshing" class="loading-spinner" style="width:14px;height:14px;border-width:2px"></span>
          <span x-show="!$store.ui.refreshing">⟳</span>
        </button>
        <button class="btn btn-muted" @click="cycleTheme" aria-label="Toggle dark/light theme" title="Toggle theme">
          <svg class="icon" x-cloak x-show="theme==='light'"><use href="#icon-sun"/></svg>
          <svg class="icon" x-cloak x-show="theme!=='light'"><use href="#icon-moon"/></svg>
        </button>
      </div>
    </nav>

    <!-- Global strip (every tab) -->
    <div class="kpi-row global-strip">
      <div class="kpi-card" :class="'strip-band-' + (($store.dashboard.signal?.band||'normal').toLowerCase())" @click="$store.ui.setTab('signal')">
        <div class="kpi-label">Risk</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" style="font-size:var(--fs-kpi)" :class="'band-'+(($store.dashboard.signal?.band||'normal').toLowerCase())" x-text="$store.dashboard.signal?.score ?? '--'"></div>
            <div class="kpi-trend" x-text="($store.dashboard.signal?.band||'').toUpperCase()"></div>
          </div>
          <svg class="kpi-spark" viewBox="0 0 60 20" style="stroke:var(--spark)">
            <polyline fill="none" stroke-width="1.5" :points="$store.dashboard.signalSpark || '0,10 60,10'"></polyline>
          </svg>
        </div>
      </div>
      <div class="kpi-card" :class="'strip-band-' + (($store.dashboard.dews?.band||'normal').toLowerCase())" @click="$store.ui.setTab('signal')">
        <div class="kpi-label">DEWS</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" style="font-size:var(--fs-kpi)" x-text="$store.dashboard.dews?.dews_score ?? '--'"></div>
            <div class="kpi-trend" x-text="($store.dashboard.dews?.band||'normal').toUpperCase()"></div>
          </div>
          <svg class="kpi-spark" viewBox="0 0 60 20" style="stroke:var(--spark)">
            <polyline fill="none" stroke-width="1.5" :points="$store.dashboard.dewsSpark || $store.dashboard.signalSpark || '0,10 60,10'"></polyline>
          </svg>
        </div>
      </div>
      <div class="kpi-card" @click="$store.ui.setTab('signal')">
        <div class="kpi-label">Anomalies</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" style="font-size:var(--fs-kpi)" :class="$store.dashboard.anomalyCount > 0 ? 'band-watch' : ''" x-text="$store.dashboard.anomalyCount ?? 0"></div>
            <div class="kpi-trend" x-text="$store.dashboard.anomalyCount > 0 ? 'Active flags' : 'Clear'"></div>
          </div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Peg</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" :class="$store.dashboard.depeg.current_price && Math.abs($store.dashboard.depeg.current_price-1)>0.001 ? 'band-watch' : 'text-green'" x-text="$store.dashboard.depeg.current_price?.toFixed(4)??'--'"></div>
            <div class="kpi-trend" x-text="$store.dashboard.depeg.peg_status||''"></div>
          </div>
          <svg class="kpi-spark" viewBox="0 0 60 20" style="stroke:var(--spark)">
            <polyline fill="none" stroke-width="1.5" :points="$store.dashboard.pegSpark || '0,10 60,10'"></polyline>
          </svg>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Supply</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" x-text="$store.dashboard.totalSupply != null ? formatUsd($store.dashboard.totalSupply) : 'N/A'"></div>
            <div class="kpi-trend" :class="$store.dashboard.supplyChange!=null?($store.dashboard.supplyChange>=0?'text-green':'text-red'):''" x-text="$store.dashboard.supplyChange!=null?`${$store.dashboard.supplyChange>=0?'+':''}${$store.dashboard.supplyChange.toFixed(2)}% 24h`:''"></div>
          </div>
          <svg class="kpi-spark" viewBox="0 0 60 20" style="stroke:var(--up)">
            <polyline fill="none" stroke-width="1.5" :points="$store.dashboard.supplySpark || '0,10 60,10'"></polyline>
          </svg>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fresh</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" :class="freshnessBandClass($store.dashboard.freshness.status)" x-text="formatFreshnessLabel($store.dashboard.freshness.status)"></div>
            <div class="kpi-trend" x-text="$store.dashboard.freshness.age_minutes!=null?`${$store.dashboard.freshness.age_minutes.toFixed(0)}m ago`:''"></div>
          </div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Sources</div>
        <div class="kpi-row-inner">
          <div>
            <div class="kpi-value" x-text="`${($store.dashboard.sources||[]).filter(s=>s.status==='ok').length}/${($store.dashboard.sources||[]).length}`"></div>
            <div class="kpi-trend" :class="($store.dashboard.sources||[]).some(s=>s.status!=='ok')?'text-red':'text-green'" x-text="($store.dashboard.sources||[]).some(s=>s.status!=='ok')?'Degraded':'All OK'"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stale Warning -->
    <div class="warning-banner" :class="staleWarning ? 'visible' : ''" x-text="staleWarning"></div>

    <!-- Rate Limit Warning -->
    <div class="warning-banner" :class="rateLimitWarning ? 'visible' : ''" x-text="rateLimitWarning"></div>

    <!-- Operational metrics (rate limits, budget) -->
    <div class="warning-banner" :class="operationalWarning ? 'visible' : ''" x-text="operationalWarning" style="opacity:0.65;font-size:11px"></div>


    <!-- Tab: Signal -->
    <template x-if="$store.ui.tab === 'signal'"><div class="tab-content" x-cloak x-data="market" role="tabpanel" id="tab-signal">
      <!-- Error Banner -->
      <div x-cloak x-show="errorOverview" class="warning-banner visible" x-text="errorOverview" style="margin-bottom:8px"></div>

      <!-- Skeleton loader matches signal hero layout (not legacy donut) -->
      <div x-cloak x-show="$store.dashboard.loading">
        <div class="signal-hero skeleton-hero">
          <div class="signal-hero-left">
            <div class="skeleton" style="height:56px;width:40%;margin-bottom:8px"></div>
            <div class="skeleton skeleton-text" style="width:30%"></div>
            <div class="skeleton skeleton-text" style="width:55%;margin-top:12px"></div>
          </div>
          <div class="signal-hero-right">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-card" style="height:140px"></div>
          </div>
        </div>
        <div class="skeleton skeleton-card" style="height:80px;margin-bottom:12px"></div>
      </div>

      <!-- Main dashboard content (hidden while loading) -->
      <div x-cloak x-show="!$store.dashboard.loading">
      <!-- ROW 1: Signal hero — machine signals only (L4) -->
      <div id="signal-hero" class="signal-hero" :class="'hero-band-' + ((signal.band||'normal').toLowerCase())">
        <div class="signal-hero-left">
          <div class="signal-hero-score" x-text="signal.score ?? '--'"></div>
          <div class="signal-hero-band" :class="'band-' + ((signal.band||'normal').toLowerCase())" x-text="(signal.band || 'normal').toUpperCase()"></div>
          <svg class="kpi-spark" viewBox="0 0 60 20" preserveAspectRatio="none" style="width:120px;margin-top:8px" aria-hidden="true">
            <polyline fill="none" stroke="currentColor" stroke-width="1.5" vector-effect="non-scaling-stroke" :points="$store.dashboard.signalSpark || '0,10 60,10'"></polyline>
          </svg>
          <div class="signal-hero-meta" x-text="predictive.regime ? `Regime: ${predictive.regime} · Depeg 1h: ${((predictive.depeg_probability?.horizon_1h || 0) * 100).toFixed(1)}%` : 'Loading predictive layer…'"></div>
          <div class="signal-hero-chips" x-cloak x-show="dews?.tiers_fired?.length">
            <template x-for="t in (dews.tiers_fired || [])" :key="`${t.tier}-${t.name}`">
              <span class="signal-hero-chip band-watch" x-text="`T${t.tier} ${t.name}`"></span>
            </template>
          </div>
          <span x-cloak x-show="anomalyCount() > 0" class="badge badge-warning" style="margin-top:8px" x-text="`${anomalyCount()} anomal${anomalyCount()===1?'y':'ies'}`"></span>
        </div>
        <div class="signal-hero-right">
          <div class="section-heading">Peg · 7d</div>
          <div class="chart-wrap" id="chart-hero-peg"></div>
          <div class="signal-hero-chips">
            <span class="signal-hero-chip" x-text="depeg.current_price != null ? `Peg ${depeg.current_price.toFixed(4)}` : 'Peg —'"></span>
            <span class="signal-hero-chip" :class="supplyChange >= 0 ? 'text-green' : 'text-red'" x-text="supplyChange != null ? `Supply ${supplyChange>=0?'+':''}${supplyChange.toFixed(2)}% 24h` : 'Supply —'"></span>
          </div>
        </div>
      </div>

      <!-- ROW 2: AI insight (below hero — structured STATUS + bullets; L4 deterministic fallback) -->
      <div class="insight-card glass ai-insight-row">
        <div class="helix-panel-head" style="margin-bottom:8px">
          <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
            <span class="section-heading" style="margin:0;border:none;padding:0">Insight</span>
            <button class="time-pill" :class="aiSubTab==='overview'&&'active'" @click="aiSubTab='overview'">Overview</button>
            <button class="time-pill" :class="aiSubTab==='narrative'&&'active'" @click="aiSubTab='narrative'">Narrative</button>
            <button class="time-pill" :class="aiSubTab==='insights'&&'active'" @click="aiSubTab='insights'">Insights</button>
          </div>
          <span class="kpi-sub mono" x-cloak x-show="aiSubTab==='overview' && aiOverviewMeta"

                </label>
                <div class="ai-model-picker" x-data="{ p: splitProviderModel(modelSettingValue(feat.key)).provider, m: splitProviderModel(modelSettingValue(feat.key)).model }">
                  <select class="select" x-model="p" @change="m = ''">
                    <option value="ollama_cloud">Ollama Cloud</option>
                    <option value="openrouter">OpenRouter</option>
                  </select>
                  <select class="select" x-show="(modelCatalog[p] || []).length" x-model="m">
                    <option value="">— pick listed model —</option>
                    <template x-for="mod in (modelCatalog[p] || [])" :key="mod.id">
                      <option :value="mod.id" x-text="mod.name || mod.id"></option>
                    </template>
                  </select>
                  <input class="input" type="text" x-model="m" :placeholder="p === 'openrouter' ? 'openai/gpt-4o-mini' : 'ministral-3:8b-cloud'" style="min-width:200px">
                  <button class="btn btn-primary" type="button" @click="saveFeatureModel(feat.key, p, m)">Save</button>
                </div>
              </div>
            </template>
            <h3 class="section-heading">Provider secrets</h3>
            <p class="kpi-sub">Rotate-only — values stay masked. Paste a new key to replace.</p>
            <template x-for="s in secretSettings()" :key="s.key">
              <div class="cr-setting-row">
                <label>
                  <span x-text="s.label || s.key"></span>
                  <span class="cr-setting-hint" x-text="s.value ? 'configured' : 'not set'"></span>
                </label>
                <button class="btn btn-muted" type="button" @click="rotateSecretKey(s.key)">Rotate</button>
              </div>
            </template>
            <h3 class="section-heading">Where AI shows up</h3>
            <div class="data-table-wrap" style="max-height:none">
              <table class="data-table">
                <thead><tr><th>Surface</th><th>Tab</th><th>Toggle</th><th></th></tr></thead>
                <tbody>
                  <template x-for="row in aiFeatureMap" :key="row.ui">
                    <tr>
                      <td x-text="row.ui"></td>
                      <td x-text="row.tab"></td>
                      <td class="mono" x-text="row.toggle"></td>
                      <td><button class="btn btn-muted label-btn" type="button" x-show="row.effectSelector" @click="navigateAiEffect(row)">Go</button></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <h3 class="section-heading">Playbooks</h3>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
              <template x-for="pb in playbooks" :key="pb.name">
                <button class="btn btn-muted" type="button" @click="applyPlaybook(pb.name)" :disabled="playbookLoading!==null" x-text="pb.label || pb.name"></button>
              </template>
            </div>
            <button class="btn btn-muted" type="button" :disabled="providerTestLoading" @click="runProviderTest()">Test provider chain</button>
            <p class="kpi-sub" x-show="testAiResult" x-text="testAiResult"></p>
            <p class="kpi-sub" x-show="providerTestResult" x-text="providerTestResult"></p>
          </div>

          <!-- Data & Sources -->
          <div x-show="controlSubTab==='data'">
            <template x-for="s in tier1Settings('data')" :key="s.key">
              <div class="cr-setting-row">
                <label><span x-text="s.label || s.key"></span></label>
                <input class="input" type="number" :value="s.value" style="width:100px" @change="onTier1Change(s, $event)">
              </div>
            </template>
            <h3 class="section-heading">Quality history</h3>
            <p class="kpi-sub">Score sparkline (30d): <span x-text="qualitySparkline() || '—'"></span></p>
            <button class="btn btn-muted" type="button" @click="loadOpsStatus()">Refresh quality</button>
            <h3 class="section-heading">Enabled assets</h3>
            <button class="btn btn-muted" type="button" @click="loadAssetCatalog()">Refresh catalog</button>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
              <template x-for="row in assetCatalog" :key="row.symbol">
                <label class="signal-hero-chip"><input type="checkbox" :checked="row.enabled" @change="toggleAssetEnabled(row)"> <span x-text="row.symbol"></span></label>
              </template>
            </div>
          </div>

          <!-- Alerts -->
          <div x-show="controlSubTab==='alerts'">
            <template x-for="s in tier1Settings('alerts')" :key="s.key">
              <div class="cr-setting-row">
                <label><span x-text="s.label || s.key"></span><span class="cr-setting-hint" x-text="s.description"></span></label>
                <template x-if="s.type==='bool'"><input type="checkbox" :checked="_toBool(s.value)" @change="onTier1Change(s, $event)"></template>
                <template x-if="s.type==='enum' || (s.options && s.options.length)"><select class="select" :value="s.value" @change="onTier1Change(s, $event)"><template x-for="opt in (s.options||s.choices||[])" :key="opt"><option :value="opt" x-text="opt"></option></template></select></template>
                <template x-if="s.type!=='bool' && s.type!=='enum' && !(s.options && s.options.length)"><input class="input" :value="s.value" @change="onTier1Change(s, $event)"></template>
              </div>
            </template>
            <div class="cr-setting-row">
              <label>SMTP password</label>
              <button class="btn btn-muted" type="button" @click="rotateSecretKey('alert_smtp_pass')">Rotate</button>
            </div>
            <div class="cr-setting-row">
              <label>Send test email</label>
              <button class="btn btn-primary" type="button" @click="sendTestEmail()">Send test</button>
            </div>
            <h3 class="section-heading">Webhook endpoints</h3>
            <p class="kpi-sub">Per-endpoint HMAC signing. Event types leave empty to receive all.</p>
            <div class="cr-setting-row" style="flex-wrap:wrap;gap:8px">
              <input class="input" x-model="newWebhook.name" placeholder="Name">
              <input class="input" x-model="newWebhook.url" placeholder="https://…/hook" style="min-width:220px">
              <input class="input" x-model="newWebhook.signing_secret" placeholder="Signing secret" type="password">
              <select class="select" x-model="newWebhook.min_severity">
                <option value="info">info</option>
                <option value="warning">warning</option>
                <option value="critical">critical</option>
              </select>
              <button class="btn btn-primary" type="button" @click="createWebhookEndpoint()">Add</button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0" x-show="alertEventCatalog.length">
              <template x-for="c in alertEventCatalog" :key="c.id">
                <label class="signal-hero-chip">
                  <input type="checkbox" :value="c.id" :checked="(newWebhook.event_types||[]).includes(c.id)"
                    @change="newWebhook.event_types = $event.target.checked ? [...(newWebhook.event_types||[]), c.id] : (newWebhook.event_types||[]).filter(x => x !== c.id)">
                  <span x-text="c.label"></span>
                </label>
              </template>
            </div>
            <div class="data-table-wrap">
              <table class="data-table">
                <thead><tr><th>Name</th><th>URL</th><th>Min sev</th><th>Events</th><th></th></tr></thead>
                <tbody>
                  <template x-for="ep in webhookEndpoints" :key="ep.id">
                    <tr>
                      <td x-text="ep.name"></td>
                      <td x-text="ep.url" style="max-width:180px;overflow:hidden;text-overflow:ellipsis"></td>
                      <td x-text="ep.min_severity"></td>
                      <td x-text="(ep.event_types||[]).join(', ') || 'all'"></td>
                      <td>
                        <button class="btn btn-muted" type="button" @click="testWebhookEndpoint(ep.id)">Test</button>
                        <button class="btn btn-muted" type="button" @click="deleteWebhookEndpoint(ep.id)">Delete</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Display & Access -->
          <div x-show="controlSubTab==='display'">
            <p class="kpi-sub">Public visitors see a limited history window (default 24h). Admin login bypasses these limits.</p>
            <template x-for="s in tier1Settings('display')" :key="s.key">
              <div class="cr-setting-row">
                <label><span x-text="s.label || s.key"></span><span class="cr-setting-hint" x-text="s.description"></span></label>
                <template x-if="s.type==='bool'"><input type="checkbox" :checked="_toBool(s.value)" @change="onTier1Change(s, $event)"></template>
                <template x-if="s.type!=='bool'"><input class="input" :value="s.value" @change="onTier1Change(s, $event)"></template>
              </div>
            </template>
          </div>

          <!-- Security -->
          <div x-show="controlSubTab==='security'">
            <template x-for="s in tier1Settings('security')" :key="s.key">
              <div class="cr-setting-row">
                <label><span x-text="s.label || s.key"></span></label>
                <template x-if="s.type==='bool'"><input type="checkbox" :checked="_toBool(s.value)" @change="onTier1Change(s, $event)"></template>
                <template x-if="s.type==='enum'"><select class="select" :value="s.value" @change="onTier1Change(s, $event)"><template x-for="opt in (s.options||[])" :key="opt"><option :value="opt" x-text="opt"></option></template></select></template>
              </div>
            </template>
            <p class="kpi-sub">Set <code>TRUSTED_PROXY_CIDR</code> in <code>.env</code> for rate-limiter XFF trust.</p>
            <h3 class="section-heading">API keys</h3>
            <div class="cr-setting-row" style="flex-wrap:wrap;gap:8px">
              <input class="input" x-model="newApiKeyName" placeholder="Key name">
              <input class="input" x-model="newApiKeyAssets" placeholder="Assets (USDT,USDC) optional">
              <input class="input" x-model="newApiKeyHistoryHours" placeholder="Max history hours" style="width:140px">
              <button class="btn btn-primary" type="button" @click="createApiKey()">Create</button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">
              <template x-for="b in apiKeyBundles" :key="b">
                <label class="signal-hero-chip">
                  <input type="checkbox" :checked="(newApiKeyBundles||[]).includes(b)" @change="toggleNewKeyBundle(b)">
                  <span x-text="b"></span>
                </label>
              </template>
            </div>
            <p class="kpi-sub" x-show="createdApiKeyRaw" x-text="'Copy now: ' + createdApiKeyRaw"></p>
            <div class="data-table-wrap">
              <table class="data-table">
                <thead><tr><th>Name</th><th>Prefix</th><th>Bundles</th><th>Policy</th><th></th></tr></thead>
                <tbody>
                  <template x-for="k in apiKeys" :key="k.id">
                    <tr>
                      <td x-text="k.name"></td><td x-text="k.key_prefix"></td>
                      <td x-text="(k.scopes||[]).join(', ')"></td>
                      <td x-text="k.access_policy ? JSON.stringify(k.access_policy) : '—'" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;font-size:11px"></td>
                      <td><button class="btn btn-muted" type="button" x-show="!k.revoked_at" @click="revokeApiKey(k.id)">Revoke</button></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Advanced -->
          <div x-show="controlSubTab==='advanced'">
            <p class="kpi-sub">Search-gated registry editor for safe keys. Secrets: rotate only (masked).</p>
            <input class="input" type="search" x-model="advancedSearch" placeholder="Search registry…" style="width:100%;margin-bottom:12px">
            <template x-for="s in advancedSettings" :key="s.key">
              <div class="cr-setting-row">
                <label>
                  <span x-text="s.label || s.key"></span>
                  <span class="cr-setting-hint" x-text="s.requires_restart ? 'requires restart' : ''"></span>
                </label>
                <template x-if="s.type==='bool'">
                  <input type="checkbox" :checked="advancedDirty[s.key] !== undefined ? _toBool(advancedDirty[s.key]) : _toBool(s.value)" @change="markAdvancedDirty(s.key, $event.target.checked)">
                </template>
                <template x-if="s.type==='int'">
                  <input class="input" type="number" :value="advancedDirty[s.key] ?? s.value" style="width:100px" @change="markAdvancedDirty(s.key, parseInt($event.target.value,10))">
                </template>
                <template x-if="s.type==='float' || s.type==='number'">
                  <input class="input" type="number" step="any" :value="advancedDirty[s.key] ?? s.value" style="width:100px" @change="markAdvancedDirty(s.key, parseFloat($event.target.value))">
                </template>
                <template x-if="s.type==='enum'">
                  <select class="select" :value="advancedDirty[s.key] ?? s.value" @change="markAdvancedDirty(s.key, $event.target.value)">
                    <template x-for="opt in (s.options||[])" :key="opt"><option :value="opt" x-text="opt"></option></template>
                  </select>
                </template>
                <template x-if="s.type!=='bool' && s.type!=='int' && s.type!=='float' && s.type!=='number' && s.type!=='enum' && s.type!=='secret'">
                  <input class="input" type="text" :value="advancedDirty[s.key] ?? s.value" @change="markAdvancedDirty(s.key, $event.target.value)">
                </template>
              </div>
            </template>
            <div class="cr-dirty-bar" x-show="advancedDirtyCount > 0">
              <span x-text="`${advancedDirtyCount} unsaved change(s)`"></span>
              <button class="btn btn-primary" type="button" :disabled="advancedSaving" @click="saveAdvancedDirty()">Save</button>
            </div>
            <p class="kpi-sub" style="margin-top:12px"><a href="/admin" target="_blank" rel="noopener">Open SQLAdmin</a> for users, audit, and the full settings registry (~129 keys).</p>
            <button class="btn btn-muted" type="button" @click="exportSettings()">Export</button>
            <button class="btn btn-muted" type="button" @click="triggerImport()">Import</button>
            <input type="file" x-ref="settingsImportInput" accept="application/json,.json" style="display:none" @change="importSettings($event)">
          </div>
        </div>

      </div>
    </div>
    </template>


    <!-- Cmd+K palette -->
    <div class="cmdk-overlay" x-cloak x-show="paletteOpen" @click.self="closePalette()" @keydown.window="paletteKeydown($event)">
      <div class="cmdk-panel" @click.stop>
        <input id="cmdk-input" class="cmdk-input" type="text" placeholder="Jump to asset, tab, settings…" x-model="paletteQuery" @keydown="paletteKeydown($event)">
        <template x-for="(item, idx) in paletteItems" :key="item.type + item.label">
          <div class="cmdk-item" :class="idx === paletteIndex ? 'active' : ''" @click="runPaletteItem(item)">
            <span x-text="item.label"></span>
            <span class="search-type" x-text="item.sub || item.type"></span>
          </div>
        </template>
        <div class="kpi-sub cmdk-hint">Type an address (0x…) to investigate · Esc to close</div>
      </div>
    </div>

    <!-- Toast Container (global) -->
    <div class="toast-wrap" x-cloak x-show="$store.ui.toastVisible" role="status" aria-live="polite">
      <div class="toast" :class="'toast-' + $store.ui.toastType">
        <svg class="toast-icon" x-cloak x-show="$store.ui.toastType==='success'"><use href="#icon-arrow-up"/></svg>
        <svg class="toast-icon" x-cloak x-show="$store.ui.toastType==='error'"><use href="#icon-warning"/></svg>
        <svg class="toast-icon" x-cloak x-show="$store.ui.toastType==='info'"><use href="#icon-search"/></svg>
        <div class="toast-body">
          <div class="toast-desc" x-text="$store.ui.toastMessage"></div>
        </div>
        <button class="toast-close" @click="$store.ui.hideToast()" aria-label="Dismiss notification">&times;</button>
      </div>
    </div>

    <!-- Modal Overlay (global) -->
    <div class="modal-overlay" x-cloak x-show="$store.ui.modalVisible" role="dialog" aria-modal="true" :aria-label="$store.ui.modalTitle" @click.self="$store.ui.closeModal()">
      <div class="modal-panel">
        <div class="modal-header">
          <div class="modal-title" x-text="$store.ui.modalTitle"></div>
          <button class="modal-close" @click="$store.ui.closeModal()" aria-label="Close modal">&times;</button>
        </div>
        <div class="modal-body" x-html="$store.ui.modalBody"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span x-text="`Generated ${$store.dashboard.generatedAt}`"></span>
      <span x-cloak x-show="freshnessBandClass($store.dashboard.freshness.status)==='text-red'" class="pill source-down" x-text="formatFreshnessLabel($store.dashboard.freshness.status).toLowerCase()"></span>
      <span x-cloak x-show="freshnessBandClass($store.dashboard.freshness.status)==='text-green'" class="pill source-ok">fresh</span>
      <span x-cloak x-show="freshnessBandClass($store.dashboard.freshness.status)==='band-watch'" class="pill source-watch">aging</span>
      <template x-for="s in ($store.dashboard.sources||[])" :key="s.source_name">
        <span class="pill" :class="`source-${s.status}`" x-text="`${s.source_name}: ${s.status}`"></span>
      </template>
      <span class="pill" x-text="'v' + version"></span>
    </footer>
  </main>
</body>
</html>
