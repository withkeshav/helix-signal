server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /metrics {
        include /etc/nginx/snippets/security-headers.conf;
        return 404;
    }

    # Static assets: revalidate on every load (ETag 304 = no re-download)
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # SPA fallback — main CSP lives here
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval' 'sha256-9RZrN3RExF+0bvaRfEqFGDB1AuQYP7U9C++sm12qeCQ=' 'sha256-YY7B1+ExoluQx0JdcMuQ3KniZujV85d3RORaBWuEbAE='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }
}
